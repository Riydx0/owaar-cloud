version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: owaar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-owaar_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-owaar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-owaar} -d ${POSTGRES_DB:-owaar_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - owaar_network

  # ─────────────────────────────────────────────
  # API Server (Backend) — Port 3000
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: owaar_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-owaar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-owaar_cloud}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - owaar_network

  # ─────────────────────────────────────────────
  # Frontend (React/Vite) — Port 4000
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: owaar_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4000}:80"
    environment:
      API_URL: ${API_URL:-http://api:3000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - owaar_network

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

networks:
  owaar_network:
    driver: bridge
