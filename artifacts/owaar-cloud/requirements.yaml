notes:
  - Global fetch interceptor added in main/App to inject Authorization: Bearer token for all generated @workspace/api-client-react hooks
  - Relies on generated React Query hooks and schemas from lib/api-client-react
  - Force dark mode theme via CSS variables, RTL support managed by html dir attribute
