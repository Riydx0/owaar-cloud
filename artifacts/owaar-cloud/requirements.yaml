packages:
  "framer-motion": "For fluid page transitions and stunning micro-interactions"
  "zustand": "For lightweight global state management (auth, language)"
  "date-fns": "For formatting deployment dates cleanly"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind classes"
