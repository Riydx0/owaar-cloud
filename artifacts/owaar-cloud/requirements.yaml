images:
  - path: "artifacts/owaar-cloud/public/images/hero-bg.png"
    description: "Abstract premium dark mode gradient background with deep navy and sapphire blue glowing wisps, modern enterprise SaaS feel, ultra high resolution"
    aspect_ratio: "16:9"
  - path: "artifacts/owaar-cloud/public/images/logo-icon.png"
    description: "Minimalist glowing sapphire blue cloud icon on a transparent background, professional tech startup logo mark"
